name: DevOps Simple Check

on:
  push:
    branches:
      - main

jobs:
  check-project:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show files
        run: ls -la

      - name: Check app folder
        run: ls -la app

      - name: Print index.html
        run: cat app/index.html

      - name: Search errors in logs
        run: grep ERROR logs/app.log